services:
  postgres:
    image: postgres:16
    container_name: municipalos-postgres
    environment:
      POSTGRES_DB: municipalos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrator:
    build:
      context: .
      dockerfile: src/MunicipalOS.Migrator/Dockerfile
    container_name: municipalos-migrator
    environment:
      CONNECTION_STRING: "Host=postgres;Port=5432;Database=municipalos;Username=postgres;Password=postgres"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: municipalos-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: municipalos-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
